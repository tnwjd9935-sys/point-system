server:
  port: 8080

spring:
  application:
    name: point

  datasource:
    url: jdbc:h2:mem:pointdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    root: INFO
    com.soojung.point: DEBUG

point:
  policy:
    min-earn-amount: 1
    max-earn-amount: 100000
    max-balance-amount: 1000000
    default-expire-days: 365
    min-expire-days-from-today: 1
    max-expire-years-from-today: 5
